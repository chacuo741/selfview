name: Build and Update Playlist

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.gitignore'
  
  pull_request:
    branches: [ main, master ]
  
  schedule:
    # 每周一10:00 UTC（北京时间18:00）自动运行
    - cron: '0 10 * * 1'
  
  workflow_dispatch:  # 允许手动触发
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动更新'
      clean_cache:
        description: '清理缓存'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.10'
  REQUIREMENTS_FILE: 'requirements.txt'

jobs:
  build-and-test:
    name: Build, Test and Update
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        persist-credentials: true

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: ${{ env.REQUIREMENTS_FILE }}

    - name: Clean cache if requested
      if: ${{ github.event.inputs.clean_cache == 'true' }}
      run: |
        echo "清理pip缓存..."
        pip cache purge

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ env.REQUIREMENTS_FILE }}
        pip install pytest pytest-cov  # 测试依赖

    - name: Run tests
      run: |
        echo "运行基础测试..."
        cd src
        python -m pytest tests/ -v || echo "No tests found, skipping"
        python -c "import crawler; print('Module import successful')"

    - name: Run crawler and update playlist
      env:
        GITHUB_ACTIONS: 'true'
        UPDATE_REASON: ${{ github.event.inputs.reason }}
      run: |
        echo "开始更新节目源..."
        cd src
        python crawler.py
        echo "节目源更新完成"

    - name: Check for changes
      id: check-changes
      run: |
        git status --porcelain
        if [ -n "$(git status --porcelain)" ]; then
          echo "检测到文件变化"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "::notice title=检测到更新::节目源文件已更新，需要提交"
        else
          echo "没有文件变化"
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "::notice title=无需更新::节目源文件没有变化"
        fi

    - name: Configure Git
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

    - name: Commit and push changes
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        git add playlist.m3u update.log playlist.m3u.backup last_check.txt || true
        
        # 生成提交信息
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          COMMIT_MSG="手动更新: ${{ github.event.inputs.reason }} - $(date '+%Y-%m-%d %H:%M:%S')"
        elif [ "${{ github.event_name }}" = "schedule" ]; then
          COMMIT_MSG="自动更新节目源 - $(date '+%Y年%m月%d日 %H:%M:%S')"
        else
          COMMIT_MSG="更新节目源文件 - $(date '+%Y-%m-%d %H:%M:%S')"
        fi
        
        git commit -m "$COMMIT_MSG"
        git push
        
        echo "::notice title=更新成功::$COMMIT_MSG"

    - name: Create summary report
      if: always()
      run: |
        echo "# 构建报告" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 基本信息" >> $GITHUB_STEP_SUMMARY
        echo "- **触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **触发分支**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        echo "- **运行时间**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.check-changes.outputs.has_changes }}" = "true" ]; then
          echo "## 更新结果 ✅" >> $GITHUB_STEP_SUMMARY
          echo "- 节目源文件已更新并提交" >> $GITHUB_STEP_SUMMARY
          
          # 显示文件变化
          if [ -f "playlist.m3u" ]; then
            LINE_COUNT=$(wc -l < playlist.m3u || echo "0")
            CHANNEL_COUNT=$(grep -c '^#EXTINF' playlist.m3u || echo "0")
            GROUP_COUNT=$(grep -c '^#genre' playlist.m3u || echo "0")
            
            echo "### 文件统计" >> $GITHUB_STEP_SUMMARY
            echo "- 总行数: $LINE_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- 频道数量: $CHANNEL_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- 分组数量: $GROUP_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "## 更新结果 ℹ️" >> $GITHUB_STEP_SUMMARY
          echo "- 节目源文件无变化，无需更新" >> $GITHUB_STEP_SUMMARY
        fi
        
        # 显示日志最后10行
        if [ -f "update.log" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 最近日志" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -10 update.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playlist-artifacts
        path: |
          playlist.m3u
          update.log
          last_check.txt
        retention-days: 7

    - name: Send notification on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `构建失败: ${context.workflow} - ${new Date().toLocaleDateString()}`,
            body: `构建失败，请检查日志:\n\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            labels: ['bug', 'automation']
          })
