name: Update Playlist

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Run crawler
      run: |
        cd src
        python crawler.py
    
    - name: Move files to root
      run: |
        # 移动所有生成的文件到根目录
        mv src/playlist.m3u . 2>/dev/null || true
        mv src/update.log . 2>/dev/null || true
        mv src/last_check.txt . 2>/dev/null || true
        
        echo "当前目录文件:"
        ls -la *.m3u *.log *.txt 2>/dev/null || echo "No files found"
    
    - name: Commit changes
      if: always()
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        
        # 添加文件
        git add *.m3u *.log *.txt 2>/dev/null || true
        
        # 提交
        if git diff --cached --quiet; then
          echo "没有变化需要提交"
        else
          git commit -m "📺 更新节目源 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
        fi
