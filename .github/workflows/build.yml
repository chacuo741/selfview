name: Auto Update Playlist

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Run crawler to generate playlist
      run: |
        echo "Running crawler..."
        # 直接在根目录运行，不需要 cd src
        python crawler.py
        
        echo "Files generated:"
        ls -la *.m3u *.log *.txt 2>/dev/null || echo "暂时没有文件"
    
    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Configure git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Add all generated files
        git add *.m3u *.log *.txt 2>/dev/null || true
        
        # Check for changes
        if [ -z "$(git status --porcelain)" ]; then
          echo "No changes to commit"
          exit 0
        fi
        
        # Commit
        COMMIT_MSG="📺 Auto update $(date '+%Y-%m-%d %H:%M:%S')"
        echo "Committing: $COMMIT_MSG"
        git commit -m "$COMMIT_MSG"
        
        # Push
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        
        echo "✅ Successfully updated!"
