name: Update Playlist

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout with GH
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Run crawler
      run: |
        cd src
        python crawler.py
        
        echo "检查生成的文件:"
        ls -la *.m3u *.log *.txt 2>/dev/null || echo "暂时没有找到文件"
    
    - name: Move files to root
      run: |
        # 移动文件到根目录
        mv src/playlist.m3u . 2>/dev/null || true
        mv src/update.log . 2>/dev/null || true
        mv src/last_check.txt . 2>/dev/null || true
        
        echo "根目录文件:"
        ls -la *.m3u *.log *.txt 2>/dev/null || echo "暂时没有文件"
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Commit and push
      run: |
        # 添加文件
        git add *.m3u *.log *.txt 2>/dev/null || true
        
        # 检查是否有变化
        if [ -z "$(git status --porcelain)" ]; then
          echo "没有文件变化"
          exit 0
        fi
        
        # 提交
        COMMIT_MSG="📺 更新节目源 $(date '+%Y-%m-%d %H:%M:%S')"
        echo "提交信息: $COMMIT_MSG"
        git commit -m "$COMMIT_MSG"
        
        # 推送（使用PAT token）
        git push origin main
