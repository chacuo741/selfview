name: Auto Update Playlist

on:
  schedule:
    # 每周一10:00 UTC（北京时间18:00）自动运行
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run crawler
      run: |
        cd src
        python crawler.py
        
        echo "查看生成的文件:"
        ls -la
        
        # 复制文件到根目录
        if [ -f "playlist.m3u" ]; then
          cp playlist.m3u ../
          echo "已复制 playlist.m3u 到根目录"
        fi
        
        if [ -f "update.log" ]; then
          cp update.log ../
          echo "已复制 update.log 到根目录"
        fi
        
        if [ -f "last_check.txt" ]; then
          cp last_check.txt ../
          echo "已复制 last_check.txt 到根目录"
        fi

    - name: Check and commit changes
      run: |
        echo "检查文件变化..."
        
        # 查看当前状态
        git status
        
        # 添加所有相关文件
        git add . || true
        
        # 检查是否有变化
        if [ -n "$(git status --porcelain)" ]; then
          echo "检测到文件变化，准备提交..."
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          COMMIT_MSG="🔄 更新节目源 - $(date '+%Y-%m-%d %H:%M:%S')"
          git commit -m "$COMMIT_MSG"
          git push
          
          echo "✅ 已提交更新"
        else
          echo "没有文件变化"
        fi
